{% extends 'base.html' %}

{% block titulo %}Crear Artículo - Finanzas Claras{% endblock %}

{% block contenido %}
<div class="row justify-content-center mt-4">
    <div class="col-md-8">
        <div class="card">
            <div class="card-body">
                <h4 class="card-title text-center mb-4">Crear nuevo artículo</h4>
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-dark w-100">Publicar</button>
                </form>
                <p class="text-center mt-3"><a href="{% url 'blog' %}">Volver al blog</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
